version: '3.9'

x-common-env: &common-env
  STRUCTS_MONIKER: "${MONIKER}"
  STRUCTS_NETWORK_VERSION: "${NETWORK_VERSION}"
  STRUCTS_CHAIN_ID: "${NETWORK_CHAIN_ID}"
  STRUCTS_NODE_API_SEED: "${STRUCTS_NODE_API_SEED}"
  STRUCTS_RPC_SEED: "${STRUCTS_RPC_SEED}"
  STRUCTS_RPC_PRIMARY: "${STRUCTS_RPC_PRIMARY}"

x-postgres-env: &postgres-env
  POSTGRES_MEMORY_MB: "8192"
  POSTGRES_SHUTDOWN_MODE: fast
  POSTGRES_SHUTDOWN_TIMEOUT: "115"
  PGDATABASE: "${DATABASE_NAME}"
  STRUCTS_PG_BRANCH: "${STRUCTS_PG_BRANCH:-origin}"

x-guild-env: &guild-env
  GUILD_ID: "${GUILD_ID}"
  GUILD_NAME: "${GUILD_NAME}"
  GUILD_DESCRIPTION: "${GUILD_DESCRIPTION}"
  GUILD_TAG: "${GUILD_TAG}"
  GUILD_LOGO: "${GUILD_LOGO}"
  GUILD_DENOM: "${GUILD_DENOM}"
  GUILD_SOCIALS: "${GUILD_SOCIALS}"
  GUILD_WEBSITE: "${GUILD_WEBSITE}"
  GUILD_CONTACT: "${GUILD_CONTACT}"

services:
  structsd:
    image: 'structs/structsd:latest'
    hostname: 'structsd'
    volumes:
      - chaindata:/root/.structs
    restart: unless-stopped
    ports:
      - 26656:26656
      - 26657:26657
      - 1317:1317
    environment:
      <<: *common-env
      STRUCTSD_ARGUMENTS: "${STRUCTSD_ARGUMENTS}"
    healthcheck:
      test: [ "CMD-SHELL", "bash", "/root/scripts/health-check-sync-state.sh" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 48h
  structs-pg-init:
    image: 'structs/structs-pg:latest'
    hostname: 'structs-pg'
    command: [ "bash", "/src/scripts/database-init.sh" ]
    stop_grace_period: 120s
    volumes:
      - pgdata:/var/lib/postgresql/
      - pgetc:/etc/postgresql/
    environment:
      <<: [*postgres-env, *common-env]
      RUN_MIGRATIONS: "1"
      SQITCH_PG_CONNECTION: "${SQITCH_PG_CONNECTION}"
  structs-pg:
    image: 'structs/structs-pg:latest'
    hostname: 'structs-pg'
    volumes:
      - pgdata:/var/lib/postgresql/
      - pgetc:/etc/postgresql/
    ports:
      - ${DIRECT_POSTGRES_PORT:-5432}:5432
    restart: on-failure
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          memory: 8G
    depends_on:
      structs-pg-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -p 5432" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *postgres-env
  structs-pg-auto-migrate:
    image: 'structs/structs-pg:latest'
    command: [ "bash","/src/scripts/database-auto-migrate.sh" ]
    depends_on:
      structs-pg:
        condition: service_healthy
        restart: true
    environment:
      <<: [*postgres-env, *common-env]
      AUTO_MIGRATE_SLEEP: "${AUTO_MIGRATE_SLEEP}"
      SQITCH_PG_CONNECTION: "${SQITCH_PG_CONNECTION}"
  structs-nats:
    image: nats
    hostname: 'structs-nats'
    restart: on-failure
    ports:
      - 4222:4222
      - 8222:8222
      - 1443:1443
    command: "-c /etc/nats/nats.conf --cluster_name GRASS --cluster nats://0.0.0.0:6222 --http_port 8222 "
    volumes:
      - ./config/nats/:/etc/nats
  structs-grass:
    image: 'structs/structs-grass:latest'
    hostname: 'structs-grass'
    restart: on-failure
    depends_on:
      structs-pg:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "/scripts/health-check.sh" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      PG_CHANNEL: 'grass'
      NAT_HOST: 'nats://structs-nats:4222'
      PG_CONNECTION: 'postgres://structs_indexer@structs-pg:5432/structs'
  structs-webapp:
    image: 'structs/structs-webapp:latest'
    hostname: 'structs-webapp'
    restart: on-failure
    ports:
      - ${DIRECT_WEBAPP_HTTP_PORT}:80
      - ${DIRECT_WEBAPP_HTTPS_PORT}:443
    volumes:
      - type: bind
        source: "${WEBAPP_SOURCE}"
        target: /src
    environment:
      DATABASE_URL: 'postgres://structs_webapp@structs-pg:5432/structs?serverVersion=17'
      NAT_URL: 'nats://structs-nats:4222'
      APP_ENV: "${WEBAPP_APP_ENV}"
      APP_DEBUG: "${WEBAPP_APP_DEBUG}"
      APP_SECRET: "${WEBAPP_APP_SECRET}"
  structs-tsa:
    image: 'structs/structs-tsa:latest'
    hostname: 'structs-tsa'
    restart: on-failure
    volumes:
      - tsa-keyring:/var/structs/accounts
    depends_on:
      structs-pg:
        condition: service_healthy
        restart: true
    environment:
      DATABASE_URL: 'postgres://structs_webapp@structs-pg:5432/structs'
      NAT_URL: 'nats://structs-nats:4222'
      AGENT_TARGET_NUMBER: 30
  structs-crawler:
    image: 'structs/structs-crawler:latest'
    hostname: 'structs-crawler'
    restart: on-failure
    depends_on:
      structs-pg:
        condition: service_healthy
        restart: true
    environment:
      <<: *guild-env
      DATABASE_URL: 'postgres://structs_crawler@structs-pg:5432/structs'
  structs-sync-state:
    image: 'structs/structs-pg:latest'
    hostname: 'structs-sync-state'
    restart: unless-stopped
    command: [ "/src/scripts/sync_state.sh" ]
    depends_on:
      structs-pg:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: "postgres://structs_indexer@structs-pg:5432/structs"
      PGSSLMODE: "require"
      SYNC_STATE_DB_MAX_CONNS: "4"
      SYNC_POLL_INTERVAL: "3s"
      SYNC_STATE_MIRROR_RAW: "false"
      # Optional one-shot backfill then exit:
      # SYNC_ONE_SHOT: "true"
    # Do not scale this service — second instance will fail the writer lock.
  structs-control:
    image: 'structs/structs-control:latest'
    hostname: 'structs-control'
    restart: on-failure
    depends_on:
      - structs-webapp
    ports:
      - "${DIRECT_CONTROL_HTTP_PORT:-8081}:8081"
    volumes:
      - type: bind
        source: "${CONTROL_SOURCE}"
        target: /app
      - /app/node_modules
    environment:
      STRUCTS_CONTROL_MODE: dev
      STRUCTS_DEV_PROXY_TARGET: "http://structs-webapp:80"
      STRUCTS_DEV_GALLERY: "${CONTROL_DEV_GALLERY:-}"
      CHOKIDAR_USEPOLLING: "${CONTROL_CHOKIDAR_POLLING:-true}"
volumes:
  pgetc:
    name: structs-pg-etc
  pgdata:
    name: structs-pg-data
  chaindata:
    name: structsd-chaindata
  chainshare:
    name: structsd-chainshare
  chainbackup:
    name: structsd-chainbackup
  tsa-keyring: